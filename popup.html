<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }

    .container {
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      font-size: 20px;
    }

    .title {
      flex: 1;
    }

    .title h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .title p {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 2px;
    }

    .status-section {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .status-label {
      font-size: 12px;
      opacity: 0.8;
      margin-bottom: 6px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }

    .status-dot.inactive {
      background: #ef4444;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    button:active {
      transform: scale(0.98);
    }

    button.primary {
      background: #fff;
      color: #667eea;
      font-weight: 600;
    }

    button.primary:hover {
      background: #f0f0f0;
    }

    .settings {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .setting-row:last-child {
      margin-bottom: 0;
    }

    input[type="range"] {
      flex: 1;
      margin: 0 10px;
    }

    .timer {
      font-size: 12px;
      opacity: 0.8;
    }

    .footer {
      text-align: center;
      font-size: 11px;
      opacity: 0.7;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">👁️</div>
      <div class="title">
        <h1>Eye Guardian</h1>
        <p>Eye-break companion</p>
      </div>
    </div>

    <div class="status-section">
      <div class="status-label">Status</div>
      <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Active</span>
      </div>
    </div>

    <div class="controls">
      <button class="primary" id="toggleBtn">Pause Eye Breaks</button>
      <button id="resetBtn">Reset Timer</button>
    </div>

    <div class="settings">
      <div class="setting-row">
        <label for="intervalSlider">Interval (min)</label>
        <input type="range" id="intervalSlider" min="5" max="60" value="20" step="5">
        <span id="intervalValue">20</span>
      </div>
      <div class="setting-row">
        <label for="durationSlider">Duration (sec)</label>
        <input type="range" id="durationSlider" min="10" max="60" value="20" step="10">
        <span id="durationValue">20</span>
      </div>
      <div class="setting-row">
        <span>Time to break</span>
        <span class="timer" id="timer">--:--</span>
      </div>
    </div>

    <div class="footer">
      <p>Take care of your eyes! 👀</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
